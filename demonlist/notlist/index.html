<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/css/style.css">
<title>All Demon List - Not List Levels</title>

<style>
    body {
        margin: 0;
        font-family: Montserrat;
        color: white;

        background: url("/images/background.png") no-repeat center center fixed;
        background-size: cover;
    }

    .unlisted-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
    
        gap: 15px;
        margin-top: 20px;

        align-items: center;
    }
    
    .unlisted-level {
        background: rgba(255,255,255,0.05);
    
        border: 1px solid rgba(255,255,255,0.1);
    
        border-radius: 12px;
        max-width: 320px;
    
        padding: 14px;
        text-align: center;
    }

    .list-level {
        background: rgba(255,255,255,0.05);
    
        border: 1px solid rgba(255,255,255,0.1);
    
        border-radius: 12px;
        max-width: 1000px;
    
        padding: 14px;
        text-align: center;

        margin-top: 20px;

        align-items: center;
    
        transition: 0.2s ease;
    }

    .list-level:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-2px);
    }

    .unlisted-name {
        font-size: 22px;
        font-weight: bold;
    
        margin-bottom: 6px;
    }
    
    .unlisted-creator {
        font-size: 14px;
        color: #aaaaaa;
    }

    @media (max-width: 700px) {
        .unlisted-grid {
            grid-template-columns: 1fr;
        }
    }

</style>
</head>

<body>

<div class="topbar">

      <div class="left">
          <a href="/">
              <img src="/images/logo.png" class="logo">
          </a>
      </div>
      <div class="right">

              Discord
          </a>
          <a href="/demonlist" class=demon-list>
              Demon List
          </a>
      </div>

</div>

    </div>

    <div class="list-level">Acheron</div>

    <div class="unlisted-grid">
            
        <div class="unlisted-level">

</body>
</html>
