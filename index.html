<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>All Demon List</title>

    <style>
        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            font-family: Montserrat, sans-serif;
            color: white;
            text-align: center;

            background: url("images/background.png") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        h1 {
            font-size: 64px;
            margin: 0;
        }

        p {
            font-size: 20px;
            color: #cccccc;
            margin-top: 10px;
        }

        .links {
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;

            border-radius: 12px;
            text-decoration: none;

            background: rgba(255,255,255,0.1);
            color: white;

            border: 1px solid rgba(255,255,255,0.2);

            transition: 0.2s ease;
        }

        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <h1>All Demon List</h1>
    <p>All verified level in geometry dash</p>

    <div class="links">
        <a href="../demonlist/index.html" class="btn">View List</a>
        <a href="https://github.com/adlgd/adlgd.github.io" target="_blank" class="btn">GitHub</a>
    </div>

</body>
</html>
